name: 'Release'

on:
  push:
    branches: ['main']

permissions:
  contents: 'write'
  pull-requests: 'write'

jobs:
  release-please:
    runs-on: 'ubuntu-latest'
    steps:
      # Author the release PR with the personal-stack-agents App token (not the
      # default GITHUB_TOKEN) so CI runs on the PR without a manual approval
      # gate. Best-effort: falls back to GITHUB_TOKEN when the App secrets or
      # installation are absent.
      - uses: 'actions/create-github-app-token@v3'
        id: 'app-token'
        continue-on-error: true
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - id: 'release'
        uses: 'googleapis/release-please-action@v5'
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          config-file: 'release-please-config.json'
          manifest-file: '.release-please-manifest.json'
          # Publishing is owned solely by publish.yml (on: push tags). The
          # release-please tag (pushed with the App token) triggers it. A
          # duplicate publish job here raced publish.yml for the same Maven
          # coordinates and intermittently failed with 409 Conflict.
