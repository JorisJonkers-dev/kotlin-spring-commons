name: 'CI'

on:
  pull_request:
  push:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: 'ci-${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: 'read'

jobs:
  workflow-lint:
    name: 'Workflow Lint'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v7'
      - name: 'Download actionlint'
        env:
          ACTIONLINT_VERSION: '1.7.7'
        run: |
          curl -sSfL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o actionlint.tar.gz
          tar -xzf actionlint.tar.gz actionlint
      - name: 'Lint workflows'
        run: ./actionlint .github/workflows/*.yml

  gitleaks:
    name: 'Gitleaks'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v7'
      - name: 'Install gitleaks'
        env:
          GITLEAKS_VERSION: '8.30.1'
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
      - name: 'Scan working tree'
        run: ./gitleaks detect --source . --redact --exit-code 1

  # Mint a token from the release App, which has cross-repo package read, so Gradle can resolve the
  # dev.jorisjonkers convention plugins published to the gradle-conventions GitHub Packages registry.
  # The default GITHUB_TOKEN can only read this repository's own packages.
  packages-token:
    name: 'Packages Token'
    runs-on: 'ubuntu-latest'
    outputs:
      token: ${{ steps.app-token.outputs.token }}
    steps:
      - id: app-token
        uses: 'actions/create-github-app-token@v3'
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

  jvm-ci:
    name: 'JVM CI'
    needs: packages-token
    uses: 'JorisJonkers-dev/github-workflows/.github/workflows/jvm-ci.yml@v0.8.0'
    with:
      java-version: '21'
      gradle-args: '--no-daemon --stacktrace'
      lint-gradle-args: 'build'
      test-gradle-args: 'test'
      packages-token: ${{ needs.packages-token.outputs.token }}

  pipeline-complete:
    name: 'Pipeline Complete'
    if: always()
    needs: [workflow-lint, gitleaks, packages-token, jvm-ci]
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Verify all gating jobs succeeded'
        uses: 're-actors/alls-green@release/v1'
        with:
          jobs: ${{ toJSON(needs) }}
